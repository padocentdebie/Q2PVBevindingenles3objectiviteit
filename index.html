<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BTV 2026 - Masterclass Objectiviteit</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, push, update, increment, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // Firebase Configuratie
        const firebaseConfig = {
            apiKey: "AIzaSyBRq1HFmhrpW_EMMZwpURrbTArz-L5iWT4",
            databaseURL: "https://pvaangifteinleveren-77dbe-default-rtdb.europe-west1.firebasedatabase.app/",
            projectId: "pvaangifteinleveren-77dbe"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const casusData = {
            '1': { e: 'Verdriet', img: 'verdriet.jpg', ph: "Beschrijf de ogen, de mond en de handen...", k: "Rode/vochtige ogen, traanvocht over wangen, geklemd zakdoekje, haperende stem." },
            '2': { e: 'Paniek', img: 'paniek.jpg', ph: "Beschrijf de gezichtsuitdrukking en de houding...", k: "Handen in het haar geklemd, oogwit (sclera) zichtbaar rondom iris, open mond." },
            '3': { e: 'Onverschillig', img: 'onverschillig.jpg', ph: "Beschrijf de blik en de lichaamshouding...", k: "Afgewende blik, lippen stijf op elkaar gedrukt, armen strak over borst gekruist." },
            '4': { e: 'Verliefd', img: 'verliefd.jpg', ph: "Beschrijf de blikrichting, mondhoek en houding...", k: "Langdurig ononderbroken oogcontact, opgetrokken mondhoeken, naar voren gebogen romp." },
            '5': { e: 'Alcohol', img: 'alcohol.jpg', ph: "Beschrijf de oogkleur, oogleden en focus...", k: "Bloeddoorlopen (rode) ogen, hangende oogleden, glazige/onvaste blik, verslapte gezichtsspieren." },
            '6': { e: 'Drugs', img: 'drugs.jpg', ph: "Beschrijf de pupilgrootte, kaakspanning en transpiratie...", k: "Extreem verwijde of vernauwde pupillen, gespannen kaakspieren (kaakklem), zweten zonder inspanning." }
        };

        window.login = () => {
            const voornaam = document.getElementById('naam').value.trim();
            if(!voornaam) return alert("Vul je voornaam in.");
            window.voornaam = voornaam;
            document.getElementById('auth-scherm').classList.add('hidden');
            document.getElementById('hoofd-scherm').classList.remove('hidden');
            switchCasus('1');
            initFeed();
        };

        window.switchCasus = (id) => {
            window.activeCasus = id;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('bg-white', 'text-blue-900', 'border-blue-900', 'shadow-md'));
            document.getElementById('tab-'+id).classList.add('bg-white', 'text-blue-900', 'border-blue-900', 'shadow-md');
            document.getElementById('casus-titel').innerText = "ANALYSEER CASUS " + id;
            document.getElementById('casus-beeld').src = casusData[id].img;
            document.getElementById('pv-input').placeholder = casusData[id].ph;
        };

        window.verstuurPV = () => {
            const tekst = document.getElementById('pv-input').value.trim();
            if(tekst.length < 5) return alert("Typ eerst je waarneming.");
            
            push(ref(db, `btv_2026/live_feed`), {
                naam: window.voornaam,
                tekst: tekst,
                correcteCasus: window.activeCasus,
                score_obj: 0,
                score_subj: 0,
                tijd: Date.now()
            });
            
            document.getElementById('pv-input').value = "";
            document.getElementById('leer-knop').classList.remove('hidden');
            alert("Ingezonden voor review!");
        };

        window.checkMatch = (postId, gekozenId, werkelijkeId) => {
            if(gekozenId === werkelijkeId) {
                document.getElementById(`match-zone-${postId}`).innerHTML = `
                    <div class="bg-emerald-500 p-4 rounded-2xl flex items-center justify-between text-white shadow-lg animate-pulse">
                        <div class="flex items-center gap-3">
                            <img src="${casusData[gekozenId].img}" class="w-12 h-12 rounded-lg object-cover border-2 border-white/20">
                            <p class="text-[10px] font-black uppercase">Correcte Match! Beoordeel nu:</p>
                        </div>
                        <span class="text-xl">✓</span>
                    </div>`;
                document.getElementById(`feedback-zone-${postId}`).classList.remove('hidden');
            } else {
                alert("FOUT! Deze tekst beschrijft een andere situatie. Kijk goed naar de details.");
            }
        };

        window.giveFeedback = (postId, type) => {
            update(ref(db, `btv_2026/live_feed/${postId}`), {
                [type === 'obj' ? 'score_obj' : 'score_subj']: increment(1)
            });
        };

        window.toggleLeeroverzicht = () => {
            const modal = document.getElementById('leer-modal');
            modal.classList.toggle('hidden');
            const tabelBody = document.getElementById('tabel-body');
            tabelBody.innerHTML = Object.keys(casusData).map(key => `
                <tr class="border-b text-[10px]">
                    <td class="p-2 font-black text-blue-900 uppercase">Casus ${key}</td>
                    <td class="p-2 italic text-slate-600">${casusData[key].k}</td>
                </tr>`).join('');
        };

        window.resetDatabase = () => {
            if(confirm("Alle inzendingen wissen?")) remove(ref(db, `btv_2026`));
        };

        function initFeed() {
            onValue(ref(db, `btv_2026/live_feed`), (snap) => {
                const container = document.getElementById('live-feed');
                container.innerHTML = "";
                const data = snap.val();
                if(!data) return;

                Object.keys(data).reverse().forEach(key => {
                    const post = data[key];
                    container.innerHTML += `
                        <div class="bg-white p-6 rounded-[2rem] shadow-sm border-2 mb-6 border-slate-100" id="post-${key}">
                            <div class="flex justify-between items-center mb-4">
                                <span class="text-[9px] font-black text-slate-400 uppercase tracking-widest">${post.naam}</span>
                                <div class="flex gap-2 text-[9px] font-black">
                                    <span class="text-emerald-500">✓ ${post.score_obj || 0}</span>
                                    <span class="text-rose-500">✗ ${post.score_subj || 0}</span>
                                </div>
                            </div>
                            <p class="text-sm italic mb-6 text-slate-700 border-l-4 border-blue-900 pl-4 py-2 bg-slate-50 rounded-r-xl">"${post.tekst}"</p>
                            
                            <div id="match-zone-${key}" class="space-y-3">
                                <p class="text-[8px] font-black text-center text-slate-400 uppercase">Kies de bijbehorende foto:</p>
                                <div class="grid grid-cols-3 gap-2">
                                    ${[1,2,3,4,5,6].map(n => `
                                        <button onclick="checkMatch('${key}', '${n}', '${post.correcteCasus}')" class="relative rounded-xl overflow-hidden border-2 border-slate-100 hover:border-blue-500 transition-all">
                                            <img src="${casusData[n].img}" class="w-full h-16 object-cover">
                                            <div class="absolute bottom-0 right-0 bg-white/90 px-1 text-[8px] font-black">${n}</div>
                                        </button>
                                    `).join('')}
                                </div>
                            </div>

                            <div id="feedback-zone-${key}" class="hidden mt-4 pt-4 border-t flex gap-2">
                                <button onclick="giveFeedback('${key}', 'obj')" class="flex-1 bg-emerald-500 text-white text-[8px] font-black p-3 rounded-xl uppercase">Redenen</button>
                                <button onclick="giveFeedback('${key}', 'subj')" class="flex-1 bg-rose-500 text-white text-[8px] font-black p-3 rounded-xl uppercase">Aanname</button>
                            </div>
                        </div>`;
                });
            });
        }
    </script>
</head>
<body class="bg-slate-50 font-sans text-slate-900 overflow-x-hidden">

    <div id="leer-modal" class="fixed inset-0 bg-black/80 z-[60] hidden flex items-center justify-center p-4">
        <div class="bg-white rounded-[2.5rem] max-w-2xl w-full p-8 shadow-2xl overflow-y-auto max-h-[85vh]">
            <h2 class="font-black text-xl text-blue-900 mb-4 uppercase italic">Objectieve Kenmerken</h2>
            <table class="w-full text-left border-collapse">
                <thead><tr class="text-[9px] uppercase border-b-2 border-blue-900"><th class="p-2">Casus</th><th class="p-2">Wetenschap</th></tr></thead>
                <tbody id="tabel-body"></tbody>
            </table>
            <button onclick="toggleLeeroverzicht()" class="mt-6 w-full bg-[#002d5e] text-white p-4 rounded-2xl font-black uppercase text-xs">Terug</button>
        </div>
    </div>

    <div id="auth-scherm" class="fixed inset-0 bg-[#002d5e] z-50 flex items-center justify-center p-6">
        <div class="bg-white p-10 rounded-[3rem] shadow-2xl max-w-sm w-full border-t-[10px] border-blue-900 text-center">
            <h1 class="font-black text-3xl text-blue-900 mb-2 uppercase italic tracking-tighter">BTV 2026</h1>
            <p class="text-[10px] font-bold text-slate-400 mb-8 uppercase tracking-widest">Masterclass Objectiviteit</p>
            <input type="text" id="naam" placeholder="Voornaam" class="w-full border-2 p-4 rounded-2xl mb-4 font-bold text-center outline-none focus:border-blue-900 bg-slate-50">
            <button onclick="login()" class="w-full bg-[#002d5e] text-white p-4 rounded-2xl font-black uppercase text-xs tracking-widest shadow-xl">Start de les</button>
        </div>
    </div>

    <div id="hoofd-scherm" class="hidden max-w-6xl mx-auto p-4 md:p-8">
        <header class="flex justify-between items-center mb-8 bg-white p-4 rounded-2xl shadow-sm">
            <button id="leer-knop" onclick="toggleLeeroverzicht()" class="hidden bg-emerald-500 text-white px-4 py-2 rounded-full text-[9px] font-black animate-bounce uppercase">Hulp bij beschrijven</button>
            <button onclick="resetDatabase()" class="text-[8px] font-black text-rose-400 uppercase border border-rose-100 px-3 py-1 rounded-full hover:bg-rose-500 hover:text-white transition-all">Reset Database</button>
        </header>

        <div class="grid lg:grid-cols-2 gap-8 items-start">
            <section class="bg-white p-6 rounded-[2.5rem] shadow-xl border-t-[10px] border-blue-900">
                <nav class="flex gap-1 overflow-x-auto mb-6 no-scrollbar">
                    ${[1,2,3,4,5,6].map(n => `
                        <button onclick="switchCasus('${n}')" id="tab-${n}" class="tab-btn px-4 py-2 rounded-xl font-black uppercase text-[10px] bg-slate-100 transition-all">Casus ${n}</button>
                    `).join('')}
                </nav>
                <p id="casus-titel" class="text-[10px] font-black text-blue-900 mb-4 bg-blue-50 p-2 rounded text-center uppercase italic"></p>
                <div class="aspect-video mb-6 bg-slate-100 rounded-2xl overflow-hidden border-2 border-slate-50">
                    <img id="casus-beeld" src="" class="w-full h-full object-cover">
                </div>
                <textarea id="pv-input" class="w-full h-32 border-2 border-slate-50 p-4 rounded-2xl outline-none focus:border-blue-900 bg-slate-50 font-mono text-xs mb-4" placeholder=""></textarea>
                <button onclick="verstuurPV()" class="w-full bg-[#002d5e] text-white py-4 rounded-2xl font-black uppercase text-xs tracking-widest shadow-lg hover:bg-blue-800 transition-all">Verstuur naar Feed</button>
            </section>

            <section class="bg-slate-200/50 p-6 rounded-[2.5rem] h-[800px] overflow-y-auto border-4 border-white shadow-inner">
                <div id="live-feed"></div>
            </section>
        </div>
    </div>
</body>
</html>
