<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BTV 2026 - Random Duo Challenge</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, push, update, increment, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBRq1HFmhrpW_EMMZwpURrbTArz-L5iWT4",
            databaseURL: "https://pvaangifteinleveren-77dbe-default-rtdb.europe-west1.firebasedatabase.app/",
            projectId: "pvaangifteinleveren-77dbe"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const casusData = {
            '1': { e: 'Verdriet', img: 'verdriet.jpg', ph: "Beschrijf ogen, mond en handen...", k: "Rode ogen, traanvocht, zakdoekje." },
            '2': { e: 'Paniek', img: 'paniek.jpg', ph: "Beschrijf gezicht en houding...", k: "Handen in haar, oogwit zichtbaar, open mond." },
            '3': { e: 'Onverschillig', img: 'onverschillig.jpg', ph: "Beschrijf blik en armen...", k: "Afgewende blik, lippen stijf, armen gekruist." },
            '4': { e: 'Verliefd', img: 'verliefd.jpg', ph: "Beschrijf blik en mondhoek...", k: "Oogcontact, opgetrokken mondhoeken, naar voren gebogen." },
            '5': { e: 'Alcohol', img: 'alcohol.jpg', ph: "Beschrijf oogkleur en focus...", k: "Bloeddoorlopen ogen, hangende oogleden, glazig." },
            '6': { e: 'Drugs', img: 'drugs.jpg', ph: "Beschrijf pupillen en kaken...", k: "Pupilgrootte, kaakklem, zweten." }
        };

        let assignedCasussen = [];
        let currentStep = 0; // 0 = eerste casus, 1 = tweede casus, 2 = klaar

        window.login = () => {
            const voornaam = document.getElementById('naam').value.trim();
            if(!voornaam) return alert("Vul je voornaam in.");
            window.voornaam = voornaam;
            
            // Genereer 2 unieke random nummers tussen 1 en 6
            const ids = Object.keys(casusData);
            while(assignedCasussen.length < 2) {
                let r = ids[Math.floor(Math.random() * ids.length)];
                if(!assignedCasussen.includes(r)) assignedCasussen.push(r);
            }

            document.getElementById('auth-scherm').classList.add('hidden');
            document.getElementById('hoofd-scherm').classList.remove('hidden');
            loadCurrentCasus();
            initFeed();
        };

        function loadCurrentCasus() {
            if(currentStep >= 2) {
                document.getElementById('input-section').innerHTML = `
                    <div class="bg-blue-900 text-white p-10 rounded-[2.5rem] text-center shadow-2xl">
                        <h2 class="text-2xl font-black mb-4 uppercase italic">Missie Voltooid!</h2>
                        <p class="text-sm opacity-80 mb-6 font-bold">Je hebt twee casussen beschreven. Focus je nu op de feed en geef feedback aan je collega's.</p>
                        <div class="text-4xl animate-bounce">⮕</div>
                    </div>`;
                return;
            }

            const id = assignedCasussen[currentStep];
            window.activeCasus = id;
            document.getElementById('step-indicator').innerText = `OPDRACHT ${currentStep + 1} VAN 2`;
            document.getElementById('casus-titel').innerText = "ANALYSEER DEZE SITUATIE";
            document.getElementById('casus-beeld').src = casusData[id].img;
            document.getElementById('pv-input').placeholder = casusData[id].ph;
            document.getElementById('pv-input').value = "";
        }

        window.verstuurPV = () => {
            const tekst = document.getElementById('pv-input').value.trim();
            if(tekst.length < 5) return alert("Typ eerst je waarneming.");
            
            push(ref(db, `btv_2026/live_feed`), {
                naam: window.voornaam,
                tekst: tekst,
                correcteCasus: window.activeCasus,
                score_obj: 0,
                score_subj: 0,
                tijd: Date.now()
            });
            
            currentStep++;
            alert(currentStep === 1 ? "Top! Nu de tweede casus..." : "Beide casussen ingeleverd!");
            loadCurrentCasus();
        };

        window.checkMatch = (postId, gekozenId, werkelijkeId) => {
            if(gekozenId === werkelijkeId) {
                document.getElementById(`match-zone-${postId}`).innerHTML = `
                    <div class="bg-emerald-500 p-4 rounded-2xl flex items-center justify-between text-white shadow-lg">
                        <div class="flex items-center gap-3">
                            <img src="${casusData[gekozenId].img}" class="w-10 h-10 rounded object-cover border border-white/20">
                            <p class="text-[9px] font-black uppercase tracking-tighter">Correcte Match! Beoordeel nu de tekst:</p>
                        </div>
                    </div>`;
                document.getElementById(`feedback-zone-${postId}`).classList.remove('hidden');
            } else {
                alert("FOUT! Deze tekst beschrijft een ander beeld. Kijk kritisch naar de feiten!");
            }
        };

        window.giveFeedback = (postId, type) => {
            update(ref(db, `btv_2026/live_feed/${postId}`), {
                [type === 'obj' ? 'score_obj' : 'score_subj']: increment(1)
            });
        };

        window.toggleLeeroverzicht = () => {
            document.getElementById('leer-modal').classList.toggle('hidden');
            document.getElementById('tabel-body').innerHTML = Object.keys(casusData).map(key => `
                <tr class="border-b text-[10px]"><td class="p-2 font-black text-blue-900 uppercase">Casus ${key}</td><td class="p-2 italic text-slate-600">${casusData[key].k}</td></tr>`).join('');
        };

        window.resetDatabase = () => {
            if(confirm("Alle inzendingen wissen?")) remove(ref(db, `btv_2026`));
        };

        function initFeed() {
            onValue(ref(db, `btv_2026/live_feed`), (snap) => {
                const container = document.getElementById('live-feed');
                container.innerHTML = "";
                const data = snap.val();
                if(!data) return;

                Object.keys(data).reverse().forEach(key => {
                    const post = data[key];
                    container.innerHTML += `
                        <div class="bg-white p-6 rounded-[2rem] shadow-sm border-2 mb-6 border-slate-100" id="post-${key}">
                            <div class="flex justify-between items-center mb-4">
                                <span class="text-[9px] font-black text-slate-400 uppercase tracking-widest">${post.naam}</span>
                                <div class="flex gap-2 text-[9px] font-black">
                                    <span class="text-emerald-500">✓ ${post.score_obj || 0}</span>
                                    <span class="text-rose-500">✗ ${post.score_subj || 0}</span>
                                </div>
                            </div>
                            <p class="text-sm italic mb-6 text-slate-700 border-l-4 border-blue-900 pl-4 py-2 bg-slate-50 rounded-r-xl leading-relaxed">"${post.tekst}"</p>
                            
                            <div id="match-zone-${key}" class="space-y-3">
                                <p class="text-[8px] font-black text-center text-slate-400 uppercase">Kies de bijbehorende foto:</p>
                                <div class="grid grid-cols-3 gap-2">
                                    ${[1,2,3,4,5,6].map(n => `
                                        <button onclick="checkMatch('${key}', '${n}', '${post.correcteCasus}')" class="relative rounded-xl overflow-hidden border-2 border-slate-100 hover:border-blue-500 transition-all">
                                            <img src="${casusData[n].img}" class="w-full h-12 object-cover">
                                        </button>
                                    `).join('')}
                                </div>
                            </div>

                            <div id="feedback-zone-${key}" class="hidden mt-4 pt-4 border-t flex gap-2">
                                <button onclick="giveFeedback('${key}', 'obj')" class="flex-1 bg-emerald-500 text-white text-[8px] font-black p-3 rounded-xl uppercase">Redenen</button>
                                <button onclick="giveFeedback('${key}', 'subj')" class="flex-1 bg-rose-500 text-white text-[8px] font-black p-3 rounded-xl uppercase">Aanname</button>
                            </div>
                        </div>`;
                });
            });
        }
    </script>
</head>
<body class="bg-slate-50 font-sans text-slate-900">

    <div id="leer-modal" class="fixed inset-0 bg-black/80 z-[60] hidden flex items-center justify-center p-4">
        <div class="bg-white rounded-[2.5rem] max-w-2xl w-full p-8 shadow-2xl overflow-y-auto max-h-[85vh]">
            <h2 class="font-black text-xl text-blue-900 mb-4 uppercase italic">Objectieve Kenmerken</h2>
            <table class="w-full text-left border-collapse">
                <thead><tr class="text-[9px] uppercase border-b-2 border-blue-900"><th class="p-2">Casus</th><th class="p-2">Wetenschap</th></tr></thead>
                <tbody id="tabel-body"></tbody>
            </table>
            <button onclick="toggleLeeroverzicht()" class="mt-6 w-full bg-[#002d5e] text-white p-4 rounded-2xl font-black uppercase text-xs">Terug</button>
        </div>
    </div>

    <div id="auth-scherm" class="fixed inset-0 bg-[#002d5e] z-50 flex items-center justify-center p-6 text-center">
        <div class="bg-white p-10 rounded-[3rem] shadow-2xl max-w-sm w-full border-t-[12px] border-yellow-500">
            <h1 class="font-black text-3xl text-blue-900 mb-2 uppercase italic tracking-tighter">BTV 2026</h1>
            <p class="text-[10px] font-bold text-slate-400 mb-8 uppercase tracking-[0.2em]">Duo-Challenge Objectiviteit</p>
            <input type="text" id="naam" placeholder="Jouw voornaam" class="w-full border-2 p-4 rounded-2xl mb-4 font-bold text-center outline-none focus:border-blue-900 bg-slate-50">
            <button onclick="login()" class="w-full bg-[#002d5e] text-white p-5 rounded-2xl font-black uppercase tracking-widest shadow-xl">Start de les</button>
        </div>
    </div>

    <div id="hoofd-scherm" class="hidden max-w-6xl mx-auto p-4 md:p-10">
        <header class="flex justify-between items-center mb-8 bg-white p-4 rounded-2xl shadow-sm border-b-2 border-blue-900">
             <button onclick="toggleLeeroverzicht()" id="leer-knop" class="hidden bg-emerald-500 text-white px-4 py-2 rounded-full text-[9px] font-black uppercase italic animate-pulse">Hulp nodig?</button>
             <button onclick="resetDatabase()" class="text-[8px] font-black text-rose-400 uppercase border border-rose-100 px-3 py-1 rounded-full hover:bg-rose-500 hover:text-white transition-all">Sessie Reset</button>
        </header>

        <div class="grid lg:grid-cols-2 gap-10 items-start">
            <section id="input-section" class="bg-white p-8 rounded-[3rem] shadow-xl border-t-[12px] border-blue-900">
                <span id="step-indicator" class="text-[9px] font-black text-blue-900/40 uppercase tracking-widest mb-2 block"></span>
                <p id="casus-titel" class="text-[11px] font-black text-blue-900 mb-4 bg-blue-50 p-3 rounded-xl tracking-widest uppercase italic text-center"></p>
                <div class="aspect-video mb-8 bg-slate-100 rounded-3xl overflow-hidden border-2 border-slate-50">
                    <img id="casus-beeld" src="" class="w-full h-full object-cover">
                </div>
                <textarea id="pv-input" class="w-full h-40 border-2 border-slate-100 p-6 rounded-3xl outline-none focus:border-blue-900 bg-slate-50 font-mono text-xs mb-4 shadow-inner" placeholder=""></textarea>
                <button onclick="verstuurPV()" class="w-full bg-[#002d5e] text-white py-5 rounded-3xl font-black uppercase tracking-widest shadow-xl hover:bg-yellow-500 hover:text-blue-900 transition-all">Inleveren voor review</button>
            </section>

            <section class="bg-slate-200/50 p-6 rounded-[3rem] h-[800px] overflow-y-auto border-4 border-white shadow-inner">
                <h2 class="font-black text-blue-900 uppercase italic mb-6 text-[10px] tracking-widest text-center">Live Feedbackfeed</h2>
                <div id="live-feed"></div>
            </section>
        </div>
    </div>
</body>
</html>
