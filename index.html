<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BTV Training 2026 - FIX</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, push } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBRq1HFmhrpW_EMMZwpURrbTArz-L5iWT4",
            databaseURL: "https://pvaangifteinleveren-77dbe-default-rtdb.europe-west1.firebasedatabase.app/",
            projectId: "pvaangifteinleveren-77dbe"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        window.login = () => {
            const naam = document.getElementById('naam').value;
            if(!naam) return alert("Naam invullen.");
            document.getElementById('auth-scherm').style.display = 'none';
            document.getElementById('hoofd-scherm').classList.remove('hidden');
            document.querySelectorAll('.verbalisant-naam').forEach(e => e.innerText = naam);
            switchCasus('A');
        };

        window.activeCasus = 'A';
        window.switchCasus = (casusId) => {
            window.activeCasus = casusId;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('bg-white', 'text-blue-900', 'border-yellow-500'));
            document.getElementById('tab-'+casusId).classList.add('bg-white', 'text-blue-900', 'border-yellow-500');
            
            const scenarios = {
                'A': {
                    tekst: 'CASUS A: SLECHT NIEUWS. De vrouw hoort dat haar partner zwaargewond is.',
                    img: 'https://images.pexels.com/photos/4101143/pexels-photo-4101143.jpeg?auto=compress&cs=tinysrgb&w=800'
                },
                'B': {
                    tekst: 'CASUS B: PANIEK. De man is zijn kind kwijt in een druk park.',
                    img: 'https://images.pexels.com/photos/4553611/pexels-photo-4553611.jpeg?auto=compress&cs=tinysrgb&w=800'
                },
                'C': {
                    tekst: 'CASUS C: MASKERING. De vrouw reageert onverschillig op vragen.',
                    img: 'https://images.pexels.com/photos/4100484/pexels-photo-4100484.jpeg?auto=compress&cs=tinysrgb&w=800'
                }
            };

            const target = scenarios[casusId];
            document.getElementById('casus-scenario').innerText = target.tekst;
            document.getElementById('casus-beeld').src = target.img;
            
            // Backup als de foto niet laadt: laat een tekst-box zien
            document.getElementById('casus-beeld').onerror = function() {
                this.src = `https://placehold.co/800x400/002d5e/white?text=BEELD+BIJ+${target.tekst.split(':')[1]}`;
            };

            initFeed(casusId);
        };

        window.checkGrammatica = () => {
            const input = document.getElementById('pv-input').value.toLowerCase();
            const feedback = document.getElementById('checker-msg');
            const verboden = [" heb ", " ben ", " was ", " werd ", " heeft ", " wordt ", " had ", " waren ", " is "];
            const fout = verboden.some(w => input.includes(w)) || input.split(/\s+/).some(w => w.startsWith("ge") && w.length > 4);

            if (fout) {
                feedback.innerHTML = "⚠️ Gebruik actieve verleden tijd (Ik zag / Ik hoorde). Geen 'is', 'was' of 'ge-'.";
                feedback.className = "mt-2 p-2 bg-red-100 text-red-700 text-[10px] rounded font-bold uppercase";
            } else if (input.length > 10) {
                feedback.innerHTML = "✓ Actieve vorm gedetecteerd.";
                feedback.className = "mt-2 p-2 bg-green-100 text-green-700 text-[10px] rounded font-bold uppercase";
            } else { feedback.innerHTML = ""; }
        };

        window.verstuurPV = () => {
            const txt = document.getElementById('pv-input').value;
            const naam = document.getElementById('naam').value;
            if(!txt) return;
            push(ref(db, `les_emoties/casus_${window.activeCasus}`), { naam, tekst: txt, tijd: Date.now() });
            document.getElementById('pv-input').value = "";
            document.getElementById('checker-msg').innerHTML = "";
        };

        function initFeed(casusId) {
            onValue(ref(db, `les_emoties/casus_${casusId}`), (snapshot) => {
                const container = document.getElementById('live-feed');
                container.innerHTML = "";
                const data = snapshot.val();
                if(data) {
                    Object.values(data).reverse().forEach(post => {
                        container.innerHTML += `<div class="bg-white p-3 rounded shadow-sm border mb-2"><div class="text-[8px] font-black text-slate-400 uppercase">${post.naam}</div><p class="text-xs italic">"${post.tekst}"</p></div>`;
                    });
                }
            });
        }
    </script>
</head>
<body class="bg-slate-100 min-h-screen">

    <div id="auth-scherm" class="fixed inset-0 bg-[#002d5e] z-50 flex items-center justify-center p-6">
        <div class="bg-white p-8 rounded-3xl shadow-2xl max-w-sm w-full border-t-8 border-yellow-500">
            <h1 class="font-black text-2xl text-blue-900 mb-6 uppercase italic text-center italic">BTV Training</h1>
            <input type="text" id="naam" placeholder="Achternaam" class="w-full border-2 p-4 rounded-xl mb-6 font-bold text-center outline-none border-slate-200 focus:border-blue-900">
            <button onclick="login()" class="w-full bg-[#002d5e] text-white p-4 rounded-xl font-black uppercase tracking-widest shadow-xl">Start Les</button>
        </div>
    </div>

    <div id="hoofd-scherm" class="hidden max-w-5xl mx-auto p-4 md:p-8 space-y-6">
        
        <header class="bg-[#002d5e] text-white p-4 rounded-2xl flex justify-between items-center border-b-4 border-yellow-500 shadow-lg">
            <div class="font-black italic uppercase text-[10px] tracking-widest">Verbalisant: <span class="verbalisant-naam text-yellow-400"></span></div>
            <div class="text-[8px] font-black uppercase animate-pulse">Live Database Verbonden</div>
        </header>

        <nav class="flex gap-1">
            <button onclick="switchCasus('A')" id="tab-A" class="tab-btn px-4 py-2 rounded-t-lg font-black uppercase text-[10px] tracking-tighter border-b-4 border-transparent bg-slate-200 transition-all">A: Verdriet</button>
            <button onclick="switchCasus('B')" id="tab-B" class="tab-btn px-4 py-2 rounded-t-lg font-black uppercase text-[10px] tracking-tighter border-b-4 border-transparent bg-slate-200 transition-all">B: Paniek</button>
            <button onclick="switchCasus('C')" id="tab-C" class="tab-btn px-4 py-2 rounded-t-lg font-black uppercase text-[10px] tracking-tighter border-b-4 border-transparent bg-slate-200 transition-all">C: Maskering</button>
        </nav>

        <div class="grid lg:grid-cols-2 gap-8 items-start">
            <section class="bg-white p-6 rounded-b-2xl rounded-tr-2xl shadow-xl border-t-8 border-blue-900">
                <p id="casus-scenario" class="text-[10px] font-black uppercase text-blue-900 mb-4 bg-blue-50 p-2 rounded tracking-tight"></p>
                
                <div class="h-64 mb-6 bg-slate-200 rounded-xl overflow-hidden shadow-inner border border-slate-300">
                    <img id="casus-beeld" src="" class="w-full h-full object-cover">
                </div>
                
                <textarea id="pv-input" oninput="checkGrammatica()" class="w-full h-32 border-2 border-slate-100 p-4 rounded-xl outline-none focus:border-blue-900 bg-slate-50 font-mono text-xs leading-relaxed" placeholder="Ik zag dat..."></textarea>
                <div id="checker-msg"></div>
                
                <button onclick="verstuurPV()" class="w-full bg-[#002d5e] text-white py-4 mt-4 rounded-xl font-black uppercase tracking-widest hover:bg-yellow-500 hover:text-blue-900 transition-all shadow-xl">Inzenden</button>
            </section>

            <section class="bg-slate-200/50 p-4 rounded-2xl min-h-[400px]">
                <h2 class="font-black text-blue-900 uppercase italic mb-4 text-[10px] tracking-widest">Klas Feed:</h2>
                <div id="live-feed"></div>
            </section>
        </div>
    </div>
</body>
</html>
